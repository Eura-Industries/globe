<div class="auth-shell">
  <div class="auth-card mat-elevation-z4">
    <div class="auth-logo">
      <span class="globe-icon">🌍</span>
      <h1>Globe</h1>
      <p class="subtitle">Plan your next adventure</p>
    </div>

    <button mat-flat-button class="social-btn google-btn" (click)="loginWithGoogle()">
      <img src="assets/icons/google.svg" alt="Google" width="18" />
      Continue with Google
    </button>

    <button mat-stroked-button class="social-btn github-btn" (click)="loginWithGithub()">
      <mat-icon>code</mat-icon>
      Continue with GitHub
    </button>

    <div class="divider"><span>or</span></div>

    <form [formGroup]="form" (ngSubmit)="loginWithEmail()" novalidate>
      <mat-form-field appearance="outline" class="full-width">
        <mat-label>Email</mat-label>
        <input matInput type="email" formControlName="email" autocomplete="email" />
        <mat-error *ngIf="form.get('email')?.hasError('required')">Email is required</mat-error>
        <mat-error *ngIf="form.get('email')?.hasError('email')">Enter a valid email</mat-error>
      </mat-form-field>

      <mat-form-field appearance="outline" class="full-width">
        <mat-label>Password</mat-label>
        <input matInput [type]="showPassword ? 'text' : 'password'" formControlName="password" autocomplete="current-password" />
        <button mat-icon-button matSuffix type="button" (click)="showPassword = !showPassword">
          <mat-icon>{{ showPassword ? 'visibility_off' : 'visibility' }}</mat-icon>
        </button>
        <mat-error *ngIf="form.get('password')?.hasError('required')">Password is required</mat-error>
      </mat-form-field>

      @if (errorMsg) {
        <p class="error-msg">{{ errorMsg }}</p>
      }

      <button mat-flat-button color="primary" type="submit" class="full-width submit-btn" [disabled]="loading">
        @if (loading) { <mat-spinner diameter="20" /> } @else { Sign In }
      </button>
    </form>

    <p class="switch-link">
      Don't have an account? <a routerLink="/register">Sign up</a>
    </p>
  </div>
</div>
