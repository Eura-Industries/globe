<div class="auth-shell">
  <div class="auth-card mat-elevation-z4">
    <div class="auth-logo">
      <span class="globe-icon">🌍</span>
      <h1>Create Account</h1>
      <p class="subtitle">Start planning your journey</p>
    </div>

    <form [formGroup]="form" (ngSubmit)="register()" novalidate>
      <mat-form-field appearance="outline" class="full-width">
        <mat-label>Display Name</mat-label>
        <input matInput formControlName="displayName" autocomplete="name" />
        <mat-error *ngIf="form.get('displayName')?.hasError('required')">Name is required</mat-error>
        <mat-error *ngIf="form.get('displayName')?.hasError('minlength')">Min 2 characters</mat-error>
      </mat-form-field>

      <mat-form-field appearance="outline" class="full-width">
        <mat-label>Email</mat-label>
        <input matInput type="email" formControlName="email" autocomplete="email" />
        <mat-error *ngIf="form.get('email')?.hasError('required')">Email is required</mat-error>
        <mat-error *ngIf="form.get('email')?.hasError('email')">Enter a valid email</mat-error>
      </mat-form-field>

      <mat-form-field appearance="outline" class="full-width">
        <mat-label>Password</mat-label>
        <input matInput [type]="showPassword ? 'text' : 'password'" formControlName="password" autocomplete="new-password" />
        <button mat-icon-button matSuffix type="button" (click)="showPassword = !showPassword">
          <mat-icon>{{ showPassword ? 'visibility_off' : 'visibility' }}</mat-icon>
        </button>
        <mat-error *ngIf="form.get('password')?.hasError('required')">Password is required</mat-error>
        <mat-error *ngIf="form.get('password')?.hasError('minlength')">Min 8 characters</mat-error>
      </mat-form-field>

      @if (errorMsg) {
        <p class="error-msg">{{ errorMsg }}</p>
      }

      <button mat-flat-button color="primary" type="submit" class="full-width submit-btn" [disabled]="loading">
        @if (loading) { <mat-spinner diameter="20" /> } @else { Create Account }
      </button>
    </form>

    <p class="switch-link">
      Already have an account? <a routerLink="/login">Sign in</a>
    </p>
  </div>
</div>
